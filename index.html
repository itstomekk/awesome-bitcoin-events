<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>₿ Bitcoin Events 2026</title>
  <meta name="description" content="Calendar of international Bitcoin conferences and events in 2026." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:       #F7931A;
      --orange-bg:    #FFF3E0;
      --orange-dark:  #D97B0F;
      --bg:           #F5F4F1;
      --card:         #FFFFFF;
      --border:       #E6E4DF;
      --text:         #111111;
      --muted:        #6B6B6B;
      --radius:       12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #FFFBF5 0%, #FEF5E7 100%);
      border-bottom: 1px solid #EDE0CC;
      padding: 40px 24px 32px;
      text-align: center;
    }
    .header-symbol {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    header p {
      color: var(--muted);
      font-size: 14px;
    }
    header p strong { color: var(--orange); }

    /* ── Sticky controls ── */
    .controls {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
    }
    .controls-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .month-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .month-tabs::-webkit-scrollbar { display: none; }
    .month-tab {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .month-tab:hover { border-color: var(--orange); color: var(--orange); }
    .month-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .search-wrap { position: relative; max-width: 380px; }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #aaa;
    }
    .search-input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--orange); background: #fff; }
    .search-input::placeholder { color: #bbb; }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    .results-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .results-meta strong { color: var(--text); }

    /* ── Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(247,147,26,0.13);
      transform: translateY(-2px);
    }
    .card-date {
      display: inline-flex;
      align-items: center;
      background: var(--orange-bg);
      color: var(--orange-dark);
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      align-self: flex-start;
    }
    .card-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .card-location {
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .card-location svg { flex-shrink: 0; }
    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--orange);
      text-decoration: none;
      margin-top: 2px;
      transition: color 0.15s;
    }
    .card-link:hover { color: var(--orange-dark); }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 72px 24px;
      color: var(--muted);
    }
    .no-results .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── Map section ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      margin: 44px 0 14px;
    }
    .map-note {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #map {
      height: 460px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 20px;
      text-align: center;
      font-size: 12.5px;
      color: var(--muted);
    }
    footer a { color: var(--orange); text-decoration: none; }
    footer a:hover { color: var(--orange-dark); }

    @media (max-width: 560px) {
      header h1 { font-size: 21px; }
      .cards-grid { grid-template-columns: 1fr; }
      .search-wrap { max-width: 100%; }
    }
  </style>
</head>

    const sOk = !searchQuery || e.where.toLowerCase().includes(searchQuery.toLowerCase());
    return mOk && sOk;
  });
}

// ── Tabs ──
function buildTabs() {
  const container = document.getElementById('month-tabs');
  const months = [...new Set(events.map(e => e.month))].sort((a,b) => a-b);
  let html = `<button class="month-tab active" data-month="0">All (${events.length})</button>`;
  months.forEach(m => {
    const cnt = events.filter(e => e.month === m).length;
    html += `<button class="month-tab" data-month="${m}">${MONTHS[m]} <span style="opacity:.65">(${cnt})</span></button>`;
  });
  container.innerHTML = html;
}

const PIN_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#F7931A" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const GLOBE_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#F7931A" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`;
const EXT_ICON  = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

function renderCards() {
  const list = filtered();
  document.getElementById('results-meta').innerHTML =
    `Showing <strong>${list.length}</strong> event${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    document.getElementById('cards-grid').innerHTML =
      `<div class="no-results"><div class="icon">🔍</div><p>No events match your filter.</p></div>`;
    return;
  }

  document.getElementById('cards-grid').innerHTML = list.map(e => {
    const isVirtual = !e.lat;
    return `
      <div class="card">
        <span class="card-date">${e.date}</span>
        <div class="card-name">${e.name}</div>
        <div class="card-location">${isVirtual ? GLOBE_ICON : PIN_ICON} ${e.where}</div>
        ${e.url ? `<a class="card-link" href="${e.url}" target="_blank" rel="noopener">Visit website ${EXT_ICON}</a>` : ''}
      </div>`;
  }).join('');
}

// ── Map ──
function groupByLocation(list) {
  const groups = {};
  list.filter(e => e.lat !== null).forEach(e => {
    const key = `${e.lat.toFixed(2)},${e.lng.toFixed(2)}`;
    if (!groups[key]) groups[key] = { lat: e.lat, lng: e.lng, where: e.where, evts: [] };
    groups[key].evts.push(e);
  });
  return Object.values(groups);
}

function buildPopup(group) {
  const rows = group.evts.map((e, i) => `
    <div style="${i ? 'margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0' : ''}">
      <div style="font-size:10.5px;font-weight:700;color:#F7931A;text-transform:uppercase;letter-spacing:.05em">${e.date}</div>
      <div style="font-size:13px;font-weight:600;color:#111;margin-top:3px;line-height:1.35">
        ${e.url
          ? `<a href="${e.url}" target="_blank" rel="noopener" style="color:#111;text-decoration:none;border-bottom:1.5px solid #F7931A">${e.name}</a>`
          : e.name}
      </div>
    </div>`).join('');
  return `<div style="font-family:system-ui,sans-serif;min-width:180px;max-width:260px">
    <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">${group.where}</div>
    ${rows}
  </div>`;
}

function updateMap() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
  groupByLocation(filtered()).forEach(group => {
    const n = group.evts.length;
    const m = L.circleMarker([group.lat, group.lng], {
      radius: n > 2 ? 11 : n > 1 ? 9 : 7,
      fillColor: '#F7931A',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.88,
    }).bindPopup(buildPopup(group))
      .bindTooltip(group.where, { direction:'top', offset:[0,-4] });
    m.addTo(map);
    mapMarkers.push(m);
  });
}

function initMap() {
  map = L.map('map', { scrollWheelZoom: false }).setView([20, 15], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);
  updateMap();
}

// ── Event listeners ──
document.getElementById('month-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.month-tab');
  if (!btn) return;
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeMonth = parseInt(btn.dataset.month);
  renderCards();
  updateMap();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderCards();
  updateMap();
});

// ── Init ──
document.getElementById('header-count').textContent = events.length;
buildTabs();
renderCards();
initMap();
</script>
</body>
</html>
